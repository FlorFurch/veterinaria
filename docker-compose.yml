services:

  backend:
    image: proyecto:0.1
    build:
      context: backend/config/django-image
    volumes:
      - ./backend/src/django:/usr/src/app:delegated
    ports:
      - "8000:8000"
    networks:
      red:

  frontend:
    image: proyecto-frontend:0.1
    build:
      context: frontend
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    networks:
      red:
networks:
  red:
